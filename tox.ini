[tox]
requires =
    tox>=4
    tox-uv>=1
# Use
#   uv python list --managed-python to see what is available from via tox-uv
# It does not seem possible to have `envlist` auto-updated w/o parsing the
# output of the above command, so it must be manually updated.
#
# Each Python version is tested with its oldest and newest compatible matplotlib.
# Compatibility reference: https://matplotlib.org/stable/devel/min_dep_policy.html
#
#   MPL     | min Python | max Python
#  ---------+------------+-----------
#   3.6-3.7 |    3.8     |    3.10
#   3.8     |    3.9     |    3.11
#   3.9     |    3.9     |    3.12
#   3.10    |    3.10    |    3.13+
#   3.11    |    3.11    |    3.14+ (not yet released)
envlist =
    py38
    py39
    py310
    py311
    py312
    py313
    py314
skip_missing_interpreters = false

# Default test environment. Use
#   `tox`               — run full test suite across all envs
#   `tox -- -m short`   — run only short-marked tests across all envs
#   `tox -e py38-mpl37` — run full test in a specific env
#   `tox -e py312-mpl310 -- -m short` — short test in a specific env
# to run.
[testenv]
runner = uv-venv-runner
setenv =
    PYTHONPATH = {tox_root}{/}etc{:}{env:PYTHONPATH}
    PATH = {env_dir}{:}{env_dir}{/}Scripts{:}{env_dir}{/}bin{:}{env:PATH}
deps =
    pytest
    tox-uv
commands =
  pytest -s -v {posargs}

